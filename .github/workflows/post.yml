name: 📸 Post to Instagram

on:
  # —— Scheduled trigger: runs every day at 9:00 AM Bangkok time (UTC+7 = 02:00 UTC) ——
  schedule:
    - cron: "0 2 * * *"
    - cron: "0 5 * * *" 
    - cron: "0 8 * * *"
    - cron: "0 11 * * *"
    - cron: "0 14 * * *"
    - cron: "0 17 * * *"
    
  # —— Manual trigger: run from the Actions tab at any time ——
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip actual Instagram publish)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo (includes the queue/ folder with team images)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache pip dependencies for faster runs
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5. Run the poster script
      - name: Run poster
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          GEMINI_KEY:    ${{ secrets.GEMINI_KEY }}
          IG_USER_ID:    ${{ secrets.IG_USER_ID }}
          INSTA_TOKEN:   ${{ secrets.INSTA_TOKEN }}
          TG_TOKEN:      ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:    ${{ secrets.TG_CHAT_ID }}
          DRY_RUN:       ${{ github.event.inputs.dry_run || 'false' }}
        run: python poster.py

      # 6. Commit any moved files (queue/ → posted/) back to the repo
      - name: Commit moved files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: archive posted image [skip ci]"
